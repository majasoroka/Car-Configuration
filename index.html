<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperDrive // Ultra 3D Configurator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <!-- Core Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-wrapper">
        <header class="glass-panel">
            <div class="brand-logo">HYPERDRIVE</div>
            <div class="model-selector-wrapper">
                <select id="car-model-selector">
                    <option value="">Loading Models...</option>
                </select>
            </div>
        </header>

        <section id="stats-dashboard" class="glass-panel">
            <div class="stat-box">
                <span class="stat-label">POWER</span>
                <span class="stat-value" id="stat-hp">0 <small>HP</small></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">TORQUE</span>
                <span class="stat-value" id="stat-torque">0 <small>LB-FT</small></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">0-60 MPH</span>
                <span class="stat-value" id="stat-speed">0.0 <small>S</small></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">WEIGHT</span>
                <span class="stat-value" id="stat-weight">0 <small>LBS</small></span>
            </div>
        </section>

        <div id="info-tooltip" class="glass-panel hidden">
            <h4 id="tooltip-title">Option Upgrades</h4>
            <p id="tooltip-text">Hover over or select an option to see its mechanical impact.</p>
        </div>

        <aside id="config-sidebar" class="glass-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="exterior">EXTERIOR</button>
                <button class="tab-btn" data-tab="interior">INTERIOR</button>
                <button class="tab-btn" data-tab="performance">PERFORMANCE</button>
            </div>
            <div id="options-container"></div>
        </aside>
    </div>

    <script>
        // 1. DATA CONFIGURATION
        const CONFIG_DATA = {
            brands: {
                "apex-motors": {
                    name: "Apex Motors",
                    models: {
                        "valkyrie": {
                            name: "Valkyrie GT",
                            baseSpecs: { hp: 620, torque: 550, zeroToSixty: 3.1, weight: 3250 },
                            options: {
                                exterior: {
                                    paint: {
                                        label: "Exterior Paint",
                                        type: "swatch",
                                        items: [
                                            { id: "nero-storm", name: "Nero Storm", value: "#0c0c0e", type: "metallic", rough: 0.1, metal: 0.9, price: 0 },
                                            { id: "monza-red", name: "Monza Red", value: "#cc0000", type: "metallic", rough: 0.15, metal: 0.85, price: 2500 },
                                            { id: "bianco-fuji", name: "Bianco Fuji", value: "#f3f3f3", type: "pearl", rough: 0.2, metal: 0.7, price: 3000 },
                                            { id: "stealth-matte", name: "Stealth Grey", value: "#4a4e51", type: "matte", rough: 0.6, metal: 0.3, price: 5000 }
                                        ]
                                    },
                                    wheels: {
                                        label: "Wheel Design",
                                        type: "list",
                                        items: [
                                            { id: "stock-5spoke", name: "19\" Aero 5-Spoke", specMods: { weight: 0 }, desc: "Standard aluminum flow-formed wheels optimizing weight distribution.", price: 0 },
                                            { id: "forged-v", name: "20\" Forged V-Spec", specMods: { weight: -24 }, desc: "Ultra-lightweight monolithic forged alloys, reducing unsprung mass by 6 lbs per corner.", price: 6800 }
                                        ]
                                    },
                                    calipers: {
                                        label: "Brake Calipers",
                                        type: "swatch",
                                        items: [
                                            { id: "caliper-black", name: "Gloss Black", value: "#111111", price: 0 },
                                            { id: "caliper-yellow", name: "Modena Yellow", value: "#ffcc00", price: 1200 },
                                            { id: "caliper-red", name: "Acid Red", value: "#ff0033", price: 1200 }
                                        ]
                                    }
                                },
                                interior: {
                                    leather: {
                                        label: "Upholstery Leather",
                                        type: "swatch",
                                        items: [
                                            { id: "nero-leather", name: "Nero Ade Alcantara", value: "#1d1d1f", rough: 0.8, metal: 0.0, price: 0 },
                                            { id: "cuoio-tan", name: "Cuoio Tuscan Leather", value: "#8b5a2b", rough: 0.7, metal: 0.0, price: 4500 }
                                        ]
                                    }
                                },
                                performance: {
                                    engine: {
                                        label: "Powertrain Optimization",
                                        type: "list",
                                        items: [
                                            { id: "ecu-stock", name: "Factory Tune", specMods: { hp: 0, torque: 0, zeroToSixty: 0 }, desc: "Stock calibration optimized for everyday road usability and standard fuel ratings.", price: 0 },
                                            { id: "ecu-stage1", name: "Stage 1 ECU Flash", specMods: { hp: 85, torque: 70, zeroToSixty: -0.3 }, desc: "Remaps fuel injection mapping and increases peak turbo boost pressure by 4.3 PSI.", price: 3200 }
                                        ]
                                    },
                                    exhaust: {
                                        label: "Exhaust Systems",
                                        type: "list",
                                        items: [
                                            { id: "ex-stock", name: "Standard Active Exhaust", specMods: { hp: 0, weight: 0 }, desc: "Dual-exit valved system adhering to variable sound regulations.", price: 0 },
                                            { id: "ex-titanium", name: "Inconel Race Pipe", specMods: { hp: 15, weight: -38, zeroToSixty: -0.1 }, desc: "Formula 1 grade Inconel alloy reducing backpressure and deleting redundant silencers.", price: 8500 }
                                        ]
                                    }
                                }
                            }
                        },
                        "kronos": {
                            name: "Kronos Hypercar",
                            baseSpecs: { hp: 980, torque: 810, zeroToSixty: 2.2, weight: 2950 },
                            options: {
                                exterior: {
                                    paint: {
                                        label: "Exterior Finish",
                                        type: "swatch",
                                        items: [
                                            { id: "carbon-exposed", name: "Exposed Gloss Carbon", value: "#1a1a1a", type: "metallic", rough: 0.05, metal: 0.9, price: 18000 },
                                            { id: "liquid-blue", name: "Liquid Cobalt", value: "#0033aa", type: "metallic", rough: 0.1, metal: 0.95, price: 6000 }
                                        ]
                                    },
                                    wheels: {
                                        label: "Wheel Execution",
                                        type: "list",
                                        items: [
                                            { id: "k-stock", name: "20\" Magnesium Disc", specMods: { weight: 0 }, desc: "Advanced light-alloy racing profile wheels.", price: 0 }
                                        ]
                                    },
                                    calipers: {
                                        label: "Caliper Configuration",
                                        type: "swatch",
                                        items: [
                                            { id: "k-caliper-blue", name: "Cobalt Matching Blue", value: "#0033aa", price: 0 }
                                        ]
                                    }
                                },
                                interior: {
                                    leather: {
                                        label: "Cockpit Materials",
                                        type: "swatch",
                                        items: [
                                            { id: "k-interior-black", name: "Grid Black Tech-Weave", value: "#111111", rough: 0.9, metal: 0.0, price: 0 }
                                        ]
                                    }
                                },
                                performance: {
                                    engine: {
                                        label: "E-Motor Tuning",
                                        type: "list",
                                        items: [
                                            { id: "k-eng-stock", name: "Standard 980hp Hybrid Unit", specMods: { hp: 0, torque: 0, zeroToSixty: 0 }, desc: "Balanced performance matrix mapping.", price: 0 },
                                            { id: "k-eng-unlocked", name: "Track Overclock Firmware", specMods: { hp: 120, torque: 95, zeroToSixty: -0.2 }, desc: "Bypasses thermal reserves on front axle induction motors to optimize overall deployment time.", price: 12500 }
                                        ]
                                    }
                                }
                            }
                        }
                    }
                }
            }
        };

        // 2. 3D SCENE GENERATOR
        class CarViewer {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.carParts = { body: null, wheels: [], calipers: [], interior: null };

                this.init();
                this.setupLighting();
                this.buildPlaceholderCar();
                this.animate();
            }

            init() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0a0c);
                this.scene.fog = new THREE.FogExp2(0x0a0a0c, 0.015);

                this.camera = new THREE.PerspectiveCamera(40, this.container.clientWidth / this.container.clientHeight, 0.1, 100);
                this.camera.position.set(5, 2, 5);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.02;
                this.controls.minDistance = 3;
                this.controls.maxDistance = 10;

                window.addEventListener('resize', () => this.onWindowResize());
            }

            setupLighting() {
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
                this.scene.add(ambientLight);

                const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
                keyLight.position.set(5, 8, 3);
                keyLight.castShadow = true;
                keyLight.shadow.mapSize.width = 2048;
                keyLight.shadow.mapSize.height = 2048;
                keyLight.shadow.bias = -0.0001;
                this.scene.add(keyLight);

                const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
                fillLight.position.set(-5, 4, -3);
                this.scene.add(fillLight);

                const floorGeo = new THREE.PlaneGeometry(50, 50);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x111115, roughness: 0.4, metalness: 0.2 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                this.scene.add(floor);

                const gridHelper = new THREE.GridHelper(40, 40, 0x33333f, 0x1a1a22);
                gridHelper.position.y = 0.01;
                this.scene.add(gridHelper);
            }

            buildPlaceholderCar() {
                const carRootGroup = new THREE.Group();

                const bodyGeo = new THREE.BoxGeometry(2.4, 0.6, 1.2);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.15, metalness: 0.85 });
                this.carParts.body = new THREE.Mesh(bodyGeo, bodyMat);
                this.carParts.body.position.y = 0.45;
                this.carParts.body.castShadow = true;
                this.carParts.body.receiveShadow = true;
                carRootGroup.add(this.carParts.body);

                const cabinGeo = new THREE.BoxGeometry(1.2, 0.4, 1.0);
                const cabinMat = new THREE.MeshStandardMaterial({ color: 0x1d1d1f, roughness: 0.7, metalness: 0.0 });
                this.carParts.interior = new THREE.Mesh(cabinGeo, cabinMat);
                this.carParts.interior.position.set(-0.1, 0.85, 0);
                this.carParts.interior.castShadow = true;
                carRootGroup.add(this.carParts.interior);

                const wheelPositions = [
                    { x: 0.7, y: 0.25, z: 0.65 },
                    { x: 0.7, y: 0.25, z: -0.65 },
                    { x: -0.7, y: 0.25, z: 0.65 },
                    { x: -0.7, y: 0.25, z: -0.65 }
                ];

                const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.25, 32);
                wheelGeo.rotateX(Math.PI / 2);
                const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5, metalness: 0.8 });

                const caliperGeo = new THREE.BoxGeometry(0.08, 0.15, 0.08);

                wheelPositions.forEach((pos) => {
                    const wheelMesh = new THREE.Mesh(wheelGeo, wheelMat);
                    wheelMesh.position.set(pos.x, pos.y, pos.z);
                    wheelMesh.castShadow = true;
                    carRootGroup.add(wheelMesh);
                    this.carParts.wheels.push(wheelMesh);

                    const caliperMat = new THREE.MeshStandardMaterial({ color: 0xff0033, roughness: 0.2, metalness: 0.5 });
                    const caliperMesh = new THREE.Mesh(caliperGeo, caliperMat);
                    caliperMesh.position.set(pos.x, pos.y + 0.12, pos.z * 0.85);
                    carRootGroup.add(caliperMesh);
                    this.carParts.calipers.push(caliperMesh);
                });

                this.scene.add(carRootGroup);
            }

            updatePaintMaterial(hexColor, roughness, metalness) {
                if (!this.carParts.body) return;
                this.carParts.body.material.color.setHex(parseInt(hexColor.replace('#', '0x')));
                this.carParts.body.material.roughness = roughness;
                this.carParts.body.material.metalness = metalness;
                this.carParts.body.material.needsUpdate = true;
            }

            updateCaliperMaterial(hexColor) {
                this.carParts.calipers.forEach(caliper => {
                    caliper.material.color.setHex(parseInt(hexColor.replace('#', '0x')));
                    caliper.material.needsUpdate = true;
                });
            }

            updateInteriorMaterial(hexColor, roughness) {
                if (!this.carParts.interior) return;
                this.carParts.interior.material.color.setHex(parseInt(hexColor.replace('#', '0x')));
                this.carParts.interior.material.roughness = roughness;
                this.carParts.interior.material.needsUpdate = true;
            }

            onWindowResize() {
                if (!this.container.clientWidth || !this.container.clientHeight) return;
                this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                if (this.controls) this.controls.update();
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        }

        // 3. APPLICATION RUNTIME ENGINE
        class ConfiguratorApp {
            constructor() {
                this.viewer = new CarViewer();
                this.currentBrand = "apex-motors";
                this.currentModel = "valkyrie";
                this.selectedOptions = { paint: null, wheels: null, calipers: null, leather: null, engine: null, exhaust: null };

                this.initUI();
            }

            initUI() {
                const modelSelector = document.getElementById('car-model-selector');
                modelSelector.innerHTML = "";

                for (const [brandId, brandData] of Object.entries(CONFIG_DATA.brands)) {
                    for (const [modelId, modelData] of Object.entries(brandData.models)) {
                        const opt = document.createElement('option');
                        opt.value = `${brandId}:${modelId}`;
                        opt.textContent = `${brandData.name} - ${modelData.name}`;
                        modelSelector.appendChild(opt);
                    }
                }

                modelSelector.addEventListener('change', (e) => {
                    if (!e.target.value) return;
                    const [brand, model] = e.target.value.split(':');
                    this.switchModel(brand, model);
                });

                const tabButtons = document.querySelectorAll('.tab-btn');
                tabButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        tabButtons.forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.renderCategoryOptions(e.target.dataset.tab);
                    });
                });

                this.switchModel(this.currentBrand, this.currentModel);
            }

            switchModel(brand, model) {
                this.currentBrand = brand;
                this.currentModel = model;
                
                const modelData = CONFIG_DATA.brands[brand].models[model];

                this.selectedOptions.paint = modelData.options.exterior.paint.items[0];
                this.selectedOptions.wheels = modelData.options.exterior.wheels.items[0];
                this.selectedOptions.calipers = modelData.options.exterior.calipers.items[0];
                this.selectedOptions.leather = modelData.options.interior.leather.items[0];
                this.selectedOptions.engine = modelData.options.performance?.engine?.items[0] || null;
                this.selectedOptions.exhaust = modelData.options.performance?.exhaust?.items[0] || null;

                const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
                this.renderCategoryOptions(activeTab);
                this.recalculateSpecs();
                this.sync3DViewer();
            }

            renderCategoryOptions(category) {
                const container = document.getElementById('options-container');
                container.innerHTML = "";
                
                const modelData = CONFIG_DATA.brands[this.currentBrand].models[this.currentModel];
                const categoryOptions = modelData.options[category];

                if (!categoryOptions) return;

                for (const [optionKey, optionGroup] of Object.entries(categoryOptions)) {
                    const groupWrap = document.createElement('div');
                    groupWrap.className = 'option-group';
                    
                    const title = document.createElement('h3');
                    title.textContent = optionGroup.label;
                    groupWrap.appendChild(title);

                    if (optionGroup.type === 'swatch') {
                        const grid = document.createElement('div');
                        grid.className = 'swatch-grid';

                        optionGroup.items.forEach(item => {
                            const swatch = document.createElement('div');
                            swatch.className = `swatch ${this.selectedOptions[optionKey]?.id === item.id ? 'active' : ''}`;
                            swatch.style.backgroundColor = item.value;
                            
                            swatch.addEventListener('click', () => {
                                this.selectedOptions[optionKey] = item;
                                this.renderCategoryOptions(category);
                                this.recalculateSpecs();
                                this.sync3DViewer();
                            });

                            swatch.addEventListener('mouseenter', () => this.showTooltip(item.name, `Premium configuration addon. Price: $${item.price.toLocaleString()}`));
                            swatch.addEventListener('mouseleave', () => this.hideTooltip());

                            grid.appendChild(swatch);
                        });
                        groupWrap.appendChild(grid);

                    } else if (optionGroup.type === 'list') {
                        const grid = document.createElement('div');
                        grid.className = 'list-grid';

                        optionGroup.items.forEach(item => {
                            const btn = document.createElement('button');
                            btn.className = `list-item ${this.selectedOptions[optionKey]?.id === item.id ? 'active' : ''}`;
                            btn.textContent = `${item.name} (+$${item.price.toLocaleString()})`;

                            btn.addEventListener('click', () => {
                                this.selectedOptions[optionKey] = item;
                                this.renderCategoryOptions(category);
                                this.recalculateSpecs();
                            });

                            btn.addEventListener('mouseenter', () => this.showTooltip(item.name, item.desc));
                            btn.addEventListener('mouseleave', () => this.hideTooltip());

                            grid.appendChild(btn);
                        });
                        groupWrap.appendChild(grid);
                    }

                    container.appendChild(groupWrap);
                }
            }

            recalculateSpecs() {
                const modelData = CONFIG_DATA.brands[this.currentBrand].models[this.currentModel];
                
                let finalHp = modelData.baseSpecs.hp;
                let finalTorque = modelData.baseSpecs.torque;
                let finalDeltaSpeed = modelData.baseSpecs.zeroToSixty;
                let finalWeight = modelData.baseSpecs.weight;

                Object.values(this.selectedOptions).forEach(opt => {
                    if (opt && opt.specMods) {
                        if (opt.specMods.hp) finalHp += opt.specMods.hp;
                        if (opt.specMods.torque) finalTorque += opt.specMods.torque;
                        if (opt.specMods.weight) finalWeight += opt.specMods.weight;
                        if (opt.specMods.zeroToSixty) finalDeltaSpeed += opt.specMods.zeroToSixty;
                    }
                });

                document.getElementById('stat-hp').innerHTML = `${finalHp} <small>HP</small>`;
                document.getElementById('stat-torque').innerHTML = `${finalTorque} <small>LB-FT</small>`;
                document.getElementById('stat-speed').innerHTML = `${finalDeltaSpeed.toFixed(2)} <small>S</small>`;
                document.getElementById('stat-weight').innerHTML = `${finalWeight.toLocaleString()} <small>LBS</small>`;
            }

            sync3DViewer() {
                if (this.selectedOptions.paint) {
                    const p = this.selectedOptions.paint;
                    this.viewer.updatePaintMaterial(p.value, p.rough || 0.15, p.metal || 0.85);
                }
                if (this.selectedOptions.calipers) {
                    this.viewer.updateCaliperMaterial(this.selectedOptions.calipers.value);
                }
                if (this.selectedOptions.leather) {
                    const l = this.selectedOptions.leather;
                    this.viewer.updateInteriorMaterial(l.value, l.rough || 0.7);
                }
            }

            showTooltip(title, text) {
                const tip = document.getElementById('info-tooltip');
                if(!tip) return;
                document.getElementById('tooltip-title').textContent = title;
                document.getElementById('tooltip-text').textContent = text;
                tip.classList.remove('hidden');
            }

            hideTooltip() {
                const tip = document.getElementById('info-tooltip');
                if(tip) tip.classList.add('hidden');
            }
        }

        // Initialize on load
        window.addEventListener('load', () => {
            // Short delay ensuring container sizing registers on strict mobile devices
            setTimeout(() => {
                window.AppInstance = new ConfiguratorApp();
            }, 100);
        });
    </script>
</body>
</html>
