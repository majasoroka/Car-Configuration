<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyperDrive // Streamed 3D Configurator Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <!-- Three.js Engine Core Framework Components -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <style>
        :root {
            --bg-blur: blur(25px);
            --panel-bg: rgba(10, 10, 12, 0.78);
            --accent: #007eff;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { width: 100%; height: 100%; background: #060607; color: #fff; overflow: hidden; position: relative; }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #ui-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; 
            display: grid;
            grid-template-columns: 340px 1fr 400px;
            grid-template-rows: auto 1fr;
            padding: 24px;
            gap: 20px;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--bg-blur);
            -webkit-backdrop-filter: var(--bg-blur);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            pointer-events: auto; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; height: 75px; }
        .brand-logo { font-family: 'Syncopate', sans-serif; font-weight: 700; font-size: 1.3rem; letter-spacing: 3px; color: #fff; }
        
        .search-nav { display: flex; gap: 12px; width: 60%; max-width: 650px; }
        #search-bar { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 0 16px; font-size: 0.9rem; outline: none; transition: 0.2s; }
        #search-bar:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        #car-model-selector { background: #121214; color: #fff; border: 1px solid var(--border); padding: 0 16px; border-radius: 10px; outline: none; font-weight: 600; cursor: pointer; }

        #stats-dashboard { grid-column: 1; align-self: center; display: flex; flex-direction: column; gap: 18px; }
        .stat-box { border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 10px; }
        .stat-box:last-child { border: none; }
        .stat-label { font-size: 0.75rem; color: #8c8c93; font-weight: 700; letter-spacing: 1px; }
        .stat-value { font-size: 1.9rem; font-weight: 300; margin-top: 2px; display: block; }
        .stat-value small { font-size: 0.85rem; color: #5c5c64; font-weight: 600; }

        #config-sidebar { grid-column: 3; display: flex; flex-direction: column; overflow: hidden; height: calc(100vh - 150px); }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: #6c6c73; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; padding: 8px 0; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid var(--accent); }
        
        #options-container { flex: 1; overflow-y: auto; padding-right: 4px; }
        .option-group { margin-bottom: 22px; }
        .option-group h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #9c9c9f; margin-bottom: 12px; }
        
        .swatch-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .swatch { aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .swatch.active { border-color: #fff; transform: scale(1.1); }
        
        .list-grid { display: flex; flex-direction: column; gap: 8px; }
        .list-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: #d1d1d6; padding: 12px; text-align: left; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .list-item:hover, .list-item.active { background: rgba(0, 126, 255, 0.12); border-color: var(--accent); color: #fff; }

        #loading-indicator {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 8px 16px; font-weight: 600;
            border-radius: 20px; font-size: 0.85rem; z-index: 100; display: none;
            box-shadow: 0 4px 12px rgba(0,126,255,0.4);
        }

        @media (max-width: 960px) {
            #ui-wrapper { grid-template-columns: 1fr; grid-template-rows: auto auto auto 1fr; padding: 12px; gap: 12px; overflow-y: auto; pointer-events: auto; }
            #canvas-container { height: 42vh; position: sticky; top: 0; }
            header { flex-direction: column; height: auto; gap: 12px; }
            .search-nav { width: 100%; }
            #stats-dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; text-align: center; }
            .stat-value { font-size: 1.1rem; }
            .stat-box { border: none; padding: 0; }
            #config-sidebar { height: auto; max-height: 480px; }
        }
    </style>
</head>
<body>

    <div id="loading-indicator">Streaming 3D Supercar...</div>
    <div id="canvas-container"></div>

    <div id="ui-wrapper">
        <header class="glass-panel">
            <div class="brand-logo">HYPERDRIVE</div>
            <div class="search-nav">
                <input type="text" id="search-bar" placeholder="Search parameters...">
                <select id="car-model-selector"></select>
            </div>
        </header>

        <section id="stats-dashboard" class="glass-panel">
            <div class="stat-box"><span class="stat-label">POWER</span><span class="stat-value" id="stat-hp">0 <small>HP</small></span></div>
            <div class="stat-box"><span class="stat-label">TORQUE</span><span class="stat-value" id="stat-torque">0 <small>LB-FT</small></span></div>
            <div class="stat-box"><span class="stat-label">0-60 MPH</span><span class="stat-value" id="stat-speed">0.0 <small>S</small></span></div>
            <div class="stat-box"><span class="stat-label">WEIGHT</span><span class="stat-value" id="stat-weight">0 <small>LBS</small></span></div>
        </section>

        <aside id="config-sidebar" class="glass-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="exterior">EXTERIOR</button>
                <button class="tab-btn" data-tab="interior">INTERIOR</button>
                <button class="tab-btn" data-tab="performance">PERFORMANCE</button>
            </div>
            <div id="options-container"></div>
        </aside>
    </div>

    <script>
        // LIVE DIRECT STREAM CHANNELS FOR AUTHENTIC CAR ASSETS
        function buildLiveGarage() {
            return {
                brands: {
                    "supercars": {
                        name: "Exotics Suite",
                        models: {
                            "ferrari": { name: "Italian Berlinetta Sports Variant", path: "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/ferrari.glb", baseSpecs: { hp: 661, torque: 561, zeroToSixty: 3.0, weight: 3252 }, options: { exterior: {}, interior: {}, performance: {} } },
                            "cyber": { name: "Futuristic Cyber Chassis Aero", path: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/SciFiHelmet/glTF-Binary/SciFiHelmet.glb", baseSpecs: { hp: 1020, torque: 900, zeroToSixty: 1.99, weight: 4600 }, options: { exterior: {}, interior: {}, performance: {} } }
                        }
                    }
                }
            };
        }

        const rawData = buildLiveGarage();
        
        const masterPaints = [
            {n:"Rosso Corsa Gloss", v:"#ff0000"}, {n:"Nardo Grey Clear", v:"#8c8c8c"}, {n:"Frozen Matte Black", v:"#0d0e10"}, 
            {n:"Miami Riviera Blue", v:"#00a8b5"}, {n:"Speedway Gold Metallic", v:"#ecc609"}, {n:"British Racing Green", v:"#0a3821"}
        ];

        Object.keys(rawData.brands).forEach(bKey => {
            Object.keys(rawData.brands[bKey].models).forEach(mKey => {
                const optGroup = rawData.brands[bKey].models[mKey].options;
                optGroup.exterior.paint = { label: "Performance Formulation Finish", type: "swatch", items: masterPaints.map((p, idx) => ({
                    id: `pt-${idx}`, name: p.n, value: p.v, price: idx > 2 ? 4500 : 0
                }))};
                optGroup.exterior.wheels = { label: "Motorsport Forged Alloys", type: "list", items: Array.from({length: 4}, (_, i) => ({
                    id: `wh-${i}`, name: `${19 + i}\" Dual 5-Spoke Forged Variant Mono`, price: i * 1200, specMods: { weight: -(i * 5) }
                }))};
                optGroup.performance.software = { label: "ECU Remaps & Diagnostics", type: "list", items: Array.from({length: 3}, (_, i) => ({
                    id: `ec-${i}`, name: `Stage ${i+1} Core Powertrain Recalibration`, price: (i+1)*2500, specMods: { hp: (i+1)*45, torque: (i+1)*35, zeroToSixty: -(i*0.15) }
                }))};
            });
        });

        const CONFIG_DATA = rawData;

        class StudioViewer {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.loaderElement = document.getElementById('loading-indicator');
                this.scene = null; this.camera = null; this.renderer = null; this.controls = null;
                this.activeCarMesh = null;
                this.initEngine();
                this.initEnvironment();
                this.renderLoop();
            }

            initEngine() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x060608);
                this.scene.fog = new THREE.FogExp2(0x060608, 0.03);

                this.camera = new THREE.PerspectiveCamera(40, this.container.clientWidth / this.container.clientHeight, 0.1, 100);
                this.camera.position.set(4.8, 1.2, 4.8);

                this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.0;
                this.container.appendChild(this.renderer.domElement);

                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.05;

                window.addEventListener('resize', () => this.resizeCanvas());
            }

            initEnvironment() {
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
                mainLight.position.set(4, 12, 4);
                this.scene.add(mainLight);

                const backlight = new THREE.DirectionalLight(0xffffff, 1.0);
                backlight.position.set(-4, 6, -4);
                this.scene.add(backlight);

                const grid = new THREE.GridHelper(50, 50, 0x22222a, 0x0e0e12);
                grid.position.y = -0.01;
                this.scene.add(grid);
            }

            load3DAsset(url) {
                if (this.activeCarMesh) this.scene.remove(this.activeCarMesh);
                this.loaderElement.style.display = "block";

                const loader = new THREE.GLTFLoader();
                loader.load(url, (gltf) => {
                    this.activeCarMesh = gltf.scene;
                    
                    // Standardize orientation and scale automatically
                    const box = new THREE.Box3().setFromObject(this.activeCarMesh);
                    const size = box.getSize(new THREE.Vector3()).length();
                    const scale = 2.8 / size;
                    this.activeCarMesh.scale.set(scale, scale, scale);
                    this.activeCarMesh.position.set(0, 0, 0);

                    this.scene.add(this.activeCarMesh);
                    this.loaderElement.style.display = "none";
                }, undefined, (err) => {
                    console.error(err);
                    this.loaderElement.style.display = "none";
                });
            }

            applyPaintMatrix(hexValue) {
                if (!this.activeCarMesh) return;
                this.activeCarMesh.traverse(node => {
                    if (node.isMesh && (node.name.toLowerCase().includes('body') || node.name.toLowerCase().includes('exterior') || node.name.toLowerCase().includes('paint'))) {
                        node.material.color.setHex(parseInt(hexValue.replace('#', '0x')));
                    }
                });
            }

            resizeCanvas() {
                this.camera.aspect = this.container.clientWidth / this.container.clientHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
            }

            renderLoop() {
                requestAnimationFrame(() => this.renderLoop());
                if (this.controls) this.controls.update();
                if (this.renderer) this.renderer.render(this.scene, this.camera);
            }
        }

        class ApplicationSuite {
            constructor() {
                this.view = new StudioViewer();
                this.brandToken = "supercars";
                this.modelToken = "ferrari";
                this.configState = {};

                this.launch();
            }

            launch() {
                const dropdown = document.getElementById('car-model-selector');
                for (const [bId, bVal] of Object.entries(CONFIG_DATA.brands)) {
                    for (const [mId, mVal] of Object.entries(bVal.models)) {
                        const opt = document.createElement('option');
                        opt.value = `${bId}:${mId}`; opt.textContent = mVal.name;
                        dropdown.appendChild(opt);
                    }
                }

                dropdown.addEventListener('change', (e) => {
                    const [brand, model] = e.target.value.split(':');
                    this.mountVehicle(brand, model);
                });

                document.querySelectorAll('.tab-btn').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
                        e.target.classList.add('active');
                        this.renderTabs(e.target.dataset.tab);
                    });
                });

                this.mountVehicle(this.brandToken, this.modelToken);
            }

            mountVehicle(brand, model) {
                this.brandToken = brand; this.modelToken = model;
                const vehicle = CONFIG_DATA.brands[brand].models[model];

                Object.keys(vehicle.options).forEach(category => {
                    Object.keys(vehicle.options[category]).forEach(group => {
                        this.configState[group] = vehicle.options[category][group].items[0];
                    });
                });

                this.view.load3DAsset(vehicle.path);
                this.renderTabs("exterior");
                this.recalculateParameters();
            }

            renderTabs(tabName) {
                const tray = document.getElementById('options-container');
                tray.innerHTML = "";
                const activeContext = CONFIG_DATA.brands[this.brandToken].models[this.modelToken].options[tabName];

                if (!activeContext) return;

                Object.entries(activeContext).forEach(([grpKey, grpObj]) => {
                    const block = document.createElement('div');
                    block.className = 'option-group';
                    const h3 = document.createElement('h3'); h3.textContent = grpObj.label;
                    block.appendChild(h3);

                    if (grpObj.type === 'swatch') {
                        const grid = document.createElement('div'); grid.className = 'swatch-grid';
                        grpObj.items.forEach(item => {
                            const sw = document.createElement('div');
                            sw.className = `swatch ${this.configState[grpKey]?.id === item.id ? 'active' : ''}`;
                            sw.style.backgroundColor = item.value;
                            sw.addEventListener('click', () => {
                                this.configState[grpKey] = item;
                                this.renderTabs(tabName);
                                this.recalculateParameters();
                            });
                            grid.appendChild(sw);
                        });
                        block.appendChild(grid);
                    } else {
                        const stack = document.createElement('div'); stack.className = 'list-grid';
                        grpObj.items.forEach(item => {
                            const card = document.createElement('button');
                            card.className = `list-item ${this.configState[grpKey]?.id === item.id ? 'active' : ''}`;
                            card.textContent = `${item.name} (+$${item.price.toLocaleString()})`;
                            card.addEventListener('click', () => {
                                this.configState[grpKey] = item;
                                this.renderTabs(tabName);
                                this.recalculateParameters();
                            });
                            stack.appendChild(card);
                        });
                        block.appendChild(stack);
                    }
                    tray.appendChild(block);
                });
            }

            recalculateParameters() {
                const baseSpecs = CONFIG_DATA.brands[this.brandToken].models[this.modelToken].baseSpecs;
                let hp = baseSpecs.hp, torque = baseSpecs.torque, speed = baseSpecs.zeroToSixty, weight = baseSpecs.weight;

                Object.values(this.configState).forEach(selection => {
                    if (selection?.specMods) {
                        if (selection.specMods.hp) hp += selection.specMods.hp;
                        if (selection.specMods.torque) torque += selection.specMods.torque;
                        if (selection.specMods.weight) weight += selection.specMods.weight;
                        if (selection.specMods.zeroToSixty) speed += selection.specMods.zeroToSixty;
                    }
                });

                document.getElementById('stat-hp').innerHTML = `${hp} <small>HP</small>`;
                document.getElementById('stat-torque').innerHTML = `${torque} <small>LB-FT</small>`;
                document.getElementById('stat-speed').innerHTML = `${speed.toFixed(2)} <small>S</small>`;
                document.getElementById('stat-weight').innerHTML = `${weight.toLocaleString()} <small>LBS</small>`;

                if (this.configState.paint) {
                    this.view.applyPaintMatrix(this.configState.paint.value);
                }
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => { new ApplicationSuite(); }, 100);
        });
    </script>
</body>
</html>
