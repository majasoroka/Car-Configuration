<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Supercar Garage</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #0b0b0b;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        /* Header styling */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        /* Core Viewer Viewport */
        .viewport-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #222226 0%, #070708 80%);
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
            --poster-color: transparent;
        }

        /* Bottom Controls UI overlay */
        .controls-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            max-width: 500px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .selector-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }

        select {
            width: 100%;
            background: #2a2a2e;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        select:focus {
            border-color: #007aff;
        }

        /* Custom drop arrow for select option */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 0.7rem;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
        }

        /* Subtle instructions indicator */
        .interaction-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 5;
        }

        /* Loading progress overlay */
        #loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #007aff;
            transform-origin: left;
            transform: scaleX(0);
            transition: transform 0.2s;
            z-index: 20;
        }
    </style>
</head>
<body>

    <header>
        <h1>Virtual Garage</h1>
        <p>Interactive 3D Showroom</p>
    </header>

    <div class="viewport-container">
        <div id="loading-bar"></div>
        
        <model-viewer 
            id="car-viewer"
            src="mclaren_f1_1993_by_alex.ka..glb" 
            alt="Garage Car Display" 
            camera-controls 
            auto-rotate
            auto-rotate-delay="3000"
            rotation-per-second="15deg"
            shadow-intensity="1.5"
            shadow-softness="0.8"
            environment-image="neutral"
            exposure="1.2"
            camera-orbit="45deg 75deg 4.5m"
            min-camera-orbit="auto auto 2.5m"
            max-camera-orbit="auto auto 8m"
            interaction-prompt="none">
        </model-viewer>

        <div class="interaction-hint">Drag to rotate • Pinch to zoom</div>

        <div class="controls-overlay">
            <label class="selector-label" for="car-select">Select Vehicle</label>
            <div class="select-wrapper">
                <select id="car-select">
                    <option value="mclaren_f1_1993_by_alex.ka..glb">1993 McLaren F1</option>
                    <option value="2024_lbsilhouette_works_murcielago_gt_evo.glb">2024 Liberty Walk Murciélago GT Evo</option>
                    <option value="free_porsche_911_carrera_4s.glb">Porsche 911 Carrera 4S</option>
                    <option value="1971_plymouth_hemi_cuda.glb">1971 Plymouth Hemi Cuda</option>
                    <option value="2017_pandem_mazda_rx-8_v1_aero_kit.glb">2017 Pandem Mazda RX-8</option>
                    <option value="2018_garage_mak_nissan_s15_silvia_-_reggie_mah.glb">2018 Garage Mak Nissan S15 Silvia</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const viewer = document.getElementById('car-viewer');
        const selector = document.getElementById('car-select');
        const loadingBar = document.getElementById('loading-bar');

        // Dynamic adjustment dictionary to balance scales and centers of different sized files
        const modelAdjustments = {
            "mclaren_f1_1993_by_alex.ka..glb": { scale: "1 1 1", orbit: "45deg 75deg 5m" },
            "2024_lbsilhouette_works_murcielago_gt_evo.glb": { scale: "1 1 1", orbit: "45deg 75deg 5m" },
            "free_porsche_911_carrera_4s.glb": { scale: "1 1 1", orbit: "45deg 75deg 4.5m" },
            "1971_plymouth_hemi_cuda.glb": { scale: "1 1 1", orbit: "45deg 75deg 5.5m" },
            "2017_pandem_mazda_rx-8_v1_aero_kit.glb": { scale: "1 1 1", orbit: "45deg 75deg 4.5m" },
            "2018_garage_mak_nissan_s15_silvia_-_reggie_mah.glb": { scale: "1 1 1", orbit: "45deg 75deg 4.5m" }
        };

        // Handle dropdown swapping
        selector.addEventListener('change', (event) => {
            const fileName = event.target.value;
            
            // Set source file path directly matching your repo names
            viewer.src = fileName;
            
            // Apply customized camera/scale metrics if specified
            if (modelAdjustments[fileName]) {
                if(modelAdjustments[fileName].scale) {
                    viewer.setAttribute('scale', modelAdjustments[fileName].scale);
                }
                if(modelAdjustments[fileName].orbit) {
                    viewer.setAttribute('camera-orbit', modelAdjustments[fileName].orbit);
                }
            }
        });

        // Top progress indicator logic
        viewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress;
            loadingBar.style.transform = `scaleX(${progress})`;
            if (progress === 1) {
                loadingBar.style.transform = 'scaleX(0)';
            }
        });
    </script>
</body>
</html>
