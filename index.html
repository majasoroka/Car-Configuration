<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperDrive // Ultra 3D Configurator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-wrapper">
        
        <header class="glass-panel">
            <div class="brand-logo">HYPERDRIVE</div>
            <div class="model-selector-wrapper">
                <select id="car-model-selector">
                    </select>
            </div>
        </header>

        <section id="stats-dashboard" class="glass-panel">
            <div class="stat-box">
                <span class="stat-label">POWER</span>
                <span class="stat-value" id="stat-hp">0 <small>HP</small></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">TORQUE</span>
                <span class="stat-value" id="stat-torque">0 <small>LB-FT</small></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">0-60 MPH</span>
                <span class="stat-value" id="stat-speed">0.0 <small>S</small></span>
            </div>
            <div class="stat-box">
                <span class="stat-label">WEIGHT</span>
                <span class="stat-value" id="stat-weight">0 <small>LBS</small></span>
            </div>
        </section>

        <div id="info-tooltip" class="glass-panel hidden">
            <h4 id="tooltip-title">Option Upgrades</h4>
            <p id="tooltip-text">Hover over or select an option to see its mechanical impact.</p>
        </div>

        <aside id="config-sidebar" class="glass-panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="exterior">EXTERIOR</button>
                <button class="tab-btn" data-tab="interior">INTERIOR</button>
                <button class="tab-btn" data-tab="performance">PERFORMANCE</button>
            </div>

            <div id="options-container"></div>
        </aside>
    </div>

    <script src="js/config.js"></script>
    <script src="js/viewer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
